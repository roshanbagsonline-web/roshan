// === From utils/imageUtils.ts (UPDATED) ===
const getDirectGoogleDriveImageUrl = (url) => {
    if (!url || !url.includes('drive.google.com')) {
        return url || '';
    }
    const match = url.match(/drive\.google\.com\/(?:file\/d\/|open\?id=)([a-zA-Z0-9_-]+)/);
    if (match && match[1]) {
        const fileId = match[1];
        // This URL format is often more reliable for direct embedding.
        return `https://lh3.googleusercontent.com/d/${fileId}`;
    }
    return url;
};


// === From utils/pdfUtils.ts ===
const waitForImagesToLoad = (element) => {
    const images = Array.from(element.getElementsByTagName('img'));
    const promises = images.map(img => {
        return new Promise((resolve) => {
            if (img.complete && img.naturalHeight !== 0) {
                resolve();
            } else {
                img.onload = resolve;
                img.onerror = () => {
                    console.error('An image failed to load for PDF generation:', img.src);
                    resolve(); // Still resolve to not block the process
                };
            }
        });
    });
    return Promise.all(promises);
};

const waitForQrCode = (element) => {
    return new Promise((resolve) => {
        const qrCanvas = element.querySelector('canvas');
        if (!qrCanvas) {
            // No QR code on this slip
            return resolve();
        }

        const checkStatus = () => {
            const status = qrCanvas.getAttribute('data-qr-status');
            return status === 'rendered' || status === 'error';
        };

        if (checkStatus()) {
            return resolve();
        }

        const observer = new MutationObserver(() => {
            if (checkStatus()) {
                observer.disconnect();
                resolve();
            }
        });

        observer.observe(qrCanvas, { attributes: true, attributeFilter: ['data-qr-status'] });

        // Timeout as a fallback to prevent waiting forever
        setTimeout(() => {
            console.warn('QR code observer timed out.');
            observer.disconnect();
            resolve();
        }, 3000);
    });
};


// === New utility for India local time ===
const getIndiaDate = () => {
    try {
        return new Intl.DateTimeFormat('en-CA', {
            timeZone: 'Asia/Kolkata',
            year: 'numeric',
            month: '2-digit',
            day: '2-digit'
        }).format(new Date());
    } catch (e) {
        // Fallback if Intl is not supported or fails
        const now = new Date();
        const indiaTime = new Date(now.getTime() + (5.5 * 60 * 60 * 1000) + (now.getTimezoneOffset() * 60 * 1000));
        return indiaTime.toISOString().split('T')[0];
    }
};

const generatePdfBlob = async (element, format) => {
    if (!element) {
        throw new Error("Element to capture is not available.");
    }
    
    // Wait for images AND QR code to load/render before capturing
    await Promise.all([
        waitForImagesToLoad(element),
        waitForQrCode(element),
    ]);

    const h2c = window.html2canvas || (typeof html2canvas === 'function' ? html2canvas : null);
    if (!h2c) {
        throw new Error("html2canvas library not found. Please ensure the script is loaded correctly.");
    }

    const canvas = await h2c(element, {
        scale: 2,
        useCORS: true,
        logging: false,
        allowTaint: true,
    });
    // Use JPEG with quality setting to significantly reduce file size
    const imgData = canvas.toDataURL('image/jpeg', 0.85);
    const pageDimensions = {
        a4: { width: 210, height: 297 },
        a5: { width: 148, height: 210 },
    };
    const { width: pageWidth, height: pageHeight } = pageDimensions[format];
    
    // Robust jsPDF initialization
    const jsPDFConstructor = window.jspdf?.jsPDF || (typeof window.jsPDF === 'function' ? window.jsPDF : null);
    if (!jsPDFConstructor) {
        throw new Error("jsPDF library not found. Please ensure the script is loaded correctly.");
    }
    
    const pdf = new jsPDFConstructor({
        orientation: 'portrait',
        unit: 'mm',
        format: format,
    });
    const canvasAspectRatio = canvas.width / canvas.height;
    let imgWidth = pageWidth;
    let imgHeight = imgWidth / canvasAspectRatio;
    if (imgHeight > pageHeight) {
        imgHeight = pageHeight;
        imgWidth = imgHeight * canvasAspectRatio;
    }
    const xOffset = (pageWidth - imgWidth) / 2;
    const yOffset = (pageHeight - imgHeight) / 2;
    // Add image as JPEG
    pdf.addImage(imgData, 'JPEG', xOffset, yOffset, imgWidth, imgHeight);
    return pdf.output('blob');
};


// === New utility for image compression ===
const compressImage = (file, maxWidth = 1024, maxHeight = 1024, quality = 0.8) => {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
            const img = new Image();
            img.src = event.target.result;
            img.onload = () => {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                if (width > height) {
                    if (width > maxWidth) {
                        height *= maxWidth / width;
                        width = maxWidth;
                    }
                } else {
                    if (height > maxHeight) {
                        width *= maxHeight / height;
                        height = maxHeight;
                    }
                }

                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const dataUrl = canvas.toDataURL('image/jpeg', quality);
                
                resolve({
                    base64: dataUrl.split(',')[1],
                    dataUrl: dataUrl,
                    mimeType: 'image/jpeg',
                });
            };
            img.onerror = (error) => reject(error);
        };
        reader.onerror = (error) => reject(error);
    });
};


// === From services/googleSheetService.ts ===
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw1I-wWwmK21t69SZ2O-k_rsUFber5lURdQwZU1T0wziVIE51jRg5GWmPBvqGHgTIIQFg/exec";
async function apiRequest(action, method = 'GET', payload) {
    const url = new URL(SCRIPT_URL);
    if (method === 'GET') {
        url.searchParams.append('action', action);
        if (payload) {
            Object.entries(payload).forEach(([key, value]) => {
                url.searchParams.append(key, String(value));
            });
        }
    }
    const options = {
        method,
        headers: {},
    };
    if (method === 'POST') {
        options.body = JSON.stringify({ action, ...payload });
        options.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
    }
    try {
        const response = await fetch(url.toString(), options);
        const contentType = response.headers.get("content-type");
        if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`HTTP error! status: ${response.status}, message: ${errorText}`);
        }
        if (!contentType || !contentType.includes("application/json")) {
            if (contentType && contentType.includes("text/html")) {
                throw new Error("Received HTML instead of JSON. Please check your Google Apps Script deployment settings. Ensure 'Who has access' is set to 'Anyone'.");
            }
            throw new Error(`Expected JSON response, but received content type: ${contentType}`);
        }
        const result = await response.json();
        if (result.status === 'error') {
            throw new Error(result.message || 'An unknown error occurred in the script');
        }
        return result;
    }
    catch (error) {
        console.error(`Error during ${action}:`, error);
        throw error;
    }
}

// === From components/MultiSelectDropdown.tsx ===
const MultiSelectDropdown = ({
    options,
    selectedOptions,
    onChange,
    placeholder = "Select services..."
}) => {
    const [isOpen, setIsOpen] = useState(false);
    const wrapperRef = useRef(null);
    useEffect(() => {
        function handleClickOutside(event) {
            if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                setIsOpen(false);
            }
        }
        document.addEventListener("mousedown", handleClickOutside);
        return () => {
            document.removeEventListener("mousedown", handleClickOutside);
        };
    }, [wrapperRef]);
    const handleOptionToggle = (option) => {
        const newSelectedOptions = selectedOptions.includes(option)
            ? selectedOptions.filter(o => o !== option)
            : [...selectedOptions, option];
        onChange(newSelectedOptions);
    };
    const getButtonText = () => {
        if (selectedOptions.length === 0) {
            return placeholder;
        }
        if (selectedOptions.length === 1) {
            return selectedOptions[0];
        }
        return `${selectedOptions.length} services selected`;
    };
    return (
        <div className="relative w-full" ref={wrapperRef}>
            <button
                type="button"
                onClick={() => setIsOpen(!isOpen)}
                className="w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm text-left focus:outline-none focus:ring-purple-500 focus:border-purple-500 flex justify-between items-center"
            >
                <span className="truncate">{getButtonText()}</span>
                <i className={`fas fa-chevron-down transition-transform duration-200 ${isOpen ? 'rotate-180' : ''}`}></i>
            </button>
            {isOpen && (
                <div className="absolute z-10 mt-1 w-full bg-white shadow-lg border rounded-md max-h-60 overflow-y-auto">
                    <ul className="py-1">
                        {options.map(option => (
                            <li
                                key={option}
                                className="px-3 py-2 text-sm text-gray-700 hover:bg-gray-100 cursor-pointer"
                                onClick={() => handleOptionToggle(option)}
                            >
                                <label className="flex items-center space-x-3 w-full cursor-pointer">
                                    <input
                                        type="checkbox"
                                        checked={selectedOptions.includes(option)}
                                        readOnly
                                        className="h-4 w-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500 cursor-pointer"
                                    />
                                    <span>{option}</span>
                                </label>
                            </li>
                        ))}
                    </ul>
                </div>
            )}
        </div>
    );
};

const DownloadButton = ({ format, service, slipRef }) => {
    const [generating, setGenerating] = useState(false);

    const handleGenerateAndDownload = async () => {
        if (!slipRef.current) return;
        setGenerating(true);
        try {
            const blob = await generatePdfBlob(slipRef.current, format);
            const filename = `${(service.customerName || 'payout').replace(/ /g, '_')}_${service.slipNo}.pdf`;
            
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);

        } catch (error) {
            console.error(`Failed to generate ${format} PDF:`, error);
            alert('Sorry, there was an error creating the PDF.');
        } finally {
            setGenerating(false);
        }
    };
    
    const isA5 = format === 'a5';

const UpdateServiceModal = ({ service, servicemenNames, serviceOptions, isOpen, onClose, onSuccess }) => {
    const [formData, setFormData] = useState(service);
    const [submitting, setSubmitting] = useState(false);
    const [error, setError] = useState(null);
    const [formErrors, setFormErrors] = useState({});
    const [imagePreview, setImagePreview] = useState(null);
    const [newImageData, setNewImageData] = useState(null);
    const [compressing, setCompressing] = useState(false);
    const [selectedServices, setSelectedServices] = useState([]);
    const [color, setColor] = useState('');
    const [size, setSize] = useState('');
    const [showDeliveryOtpModal, setShowDeliveryOtpModal] = useState(false);
const [generatedOtp, setGeneratedOtp] = useState('');
const [enteredOtp, setEnteredOtp] = useState('');
const [otpError, setOtpError] = useState('');
    
    // WhatsApp Feature State
    const [showWhatsAppConfirm, setShowWhatsAppConfirm] = useState(false);
    const [isSendingWhatsApp, setIsSendingWhatsApp] = useState(false);

    const isReadOnly = useMemo(() => service?.customerName === '--SKIPPED--', [service]);

    useEffect(() => {
        if (service) {
            setFormData(service);
            const directUrl = getDirectGoogleDriveImageUrl(service.imageUrl);
            setImagePreview(directUrl);
            setNewImageData(null);
            const serviceTypes = service.serviceType ? service.serviceType.split(',').map(s => s.trim()) : [];
            setSelectedServices(serviceTypes);
            const [colorVal = '', sizeVal = ''] = service.colorAndSize ? service.colorAndSize.split(' / ') : [];
            setColor(colorVal);
            setSize(sizeVal);
        }
    }, [service]);

    const suggestedPrice = useMemo(() => {
        const SETTINGS_KEY = 'serviceHubPro_settings';
        let markupPercentage = 30; // Default value

        try {
            const savedSettings = localStorage.getItem(SETTINGS_KEY);
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                if (settings.markupPercentage !== undefined) {
                    markupPercentage = parseFloat(settings.markupPercentage);
                }
            }
        } catch (e) {
            console.error("Could not load markup settings, using default.", e);
        }
    
        const amount = parseFloat(formData.servicemanAmount || '');
        if (!isNaN(amount) && amount > 0) {
            const calculatedPrice = amount * (1 + markupPercentage / 100);
            const roundedPrice = Math.ceil(calculatedPrice / 10) * 10;
            return roundedPrice.toFixed(0);
        }
        return null;
    }, [formData.servicemanAmount]);

    const isPaidAmountLow = useMemo(() => {
        const servicemanAmt = parseFloat(formData.servicemanAmount || '');
        const paidAmt = parseFloat(formData.customerPaidAmount || '');
        return !isNaN(servicemanAmt) && !isNaN(paidAmt) && servicemanAmt > 0 && paidAmt > 0 && paidAmt < servicemanAmt;
    }, [formData.servicemanAmount, formData.customerPaidAmount]);

    const handleChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({ ...prev, [name]: value }));
        if (formErrors[name]) {
            setFormErrors(prev => ({ ...prev, [name]: null }));
        }
        
        // Trigger WhatsApp modal when status changes to 'Informed to Customer'
        if (name === 'serviceStatus' && value === 'Informed to Customer') {
            setShowWhatsAppConfirm(true);
        }
        if (name === 'serviceStatus' && value === 'Delivered to Customer') {
            setShowDeliveryOtpModal(true);
            setGeneratedOtp(''); // Reset OTP until "Send" is clicked
        }
    };

// === Generate OPT ===

const generateAndSendOtp = async () => {
    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    setGeneratedOtp(otp);
    await sendDeliveryOtpToWhatsApp(otp);
};

// === Send Generated OTP (Updated Version) ===

const sendDeliveryOtpToWhatsApp = async (otp) => {
    try {
        const WEBHOOK_URL = "https://api.ownchat.app/apps/699d786ddb3905a893415540/events/699d786ddb3905a893415541";

        // Clean and format phone
        let phone = String(formData.contact || '').replace(/\D/g, '');
        if (phone.length === 10) {
            phone = "91" + phone;
        }

        const payload = {
            event_type: "Store_Service_Delivery_OTP",
            timestamp: new Date().toISOString(),
            data: {
                recipientPhone: phone,
                customerName: formData.customerName,
                otp: otp,
                slipNo: formData.slipNo
            }
        };

        console.log("Sending Payload:", payload);

        const response = await fetch(WEBHOOK_URL, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(payload)
        });

        const resultText = await response.text();

        console.log("Webhook Status:", response.status);
        console.log("Webhook Response:", resultText);

        if (!response.ok) {
            alert("Failed to send OTP.\nStatus: " + response.status);
        }

    } catch (error) {
        console.error("OTP WhatsApp error:", error);
        alert("Error sending OTP. Check console.");
    }
};

    } else {

const formatDisplayDate = (dateString) => {

        day: '2-digit',
        month: 'short',
        year: 'numeric'
    });
};

    const handleImageChange = async (e) => {
        const file = e.target.files?.[0];
        if (file) {
            setCompressing(true);
            setError(null);
            try {
                const compressed = await compressImage(file);
                const newFileName = file.name.replace(/\.[^/.]+$/, "") + ".jpeg";
                setNewImageData({
                    base64: compressed.base64,
                    name: newFileName,
                    mimeType: compressed.mimeType,
                });
                setImagePreview(compressed.dataUrl);
            } catch (err) {
                setError('Failed to process image. Please select a different file.');
                console.error("Image compression error:", err);
                const directUrl = getDirectGoogleDriveImageUrl(service.imageUrl);

        if (formData.estimateAmount && parseFloat(formData.estimateAmount) < 0) {

                                        <InputField label="Warranty Date" name="warrantyDate" type="date" value={formData.warrantyDate?.split('T')[0]} onChange={handleChange} error={formErrors.warrantyDate} />
                                    </>
                                )}
                             </div>
                             <div className="mt-6">
                                <h4 className="text-md font-semibold text-gray-700 mb-2">Service Description</h4>
                                <MultiSelectDropdown
                                    options={serviceOptions}
                                    selectedOptions={selectedServices}
                                    onChange={setSelectedServices}
                                />
                            </div>
                        </div>

                         <div className="p-6 border border-gray-200 rounded-lg">
                            <h3 className="text-lg font-semibold text-gray-700 mb-4">Service Status & Billing</h3>
                             <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700">Service Status</label>
                                    <select name="serviceStatus" value={formData.serviceStatus} onChange={handleChange} className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                                        {serviceStatusOptions.map(s => <option key={s} value={s}>{s}</option>)}
                                    </select>
                                </div>
                                <div>
                                    <InputField label="Serviceman Amount" name="servicemanAmount" type="number" value={formData.servicemanAmount} onChange={handleChange} error={formErrors.servicemanAmount} />
                                </div>
                                <div>
                                    <InputField label="Serviceman Name" name="servicemanName" value={formData.servicemanName} onChange={handleChange} list="servicemen-list" />
                                    <datalist id="servicemen-list">
                                        {servicemenNames.map(name => <option key={String(name)} value={String(name)} />)}
                                    </datalist>
                                </div>
                                <InputField 
                                    label="Customer Paid Amount" 
                                    name="customerPaidAmount" 
                                    type="number" 
                                    value={formData.customerPaidAmount} 
                                    onChange={handleChange} 
                                    placeholder={suggestedPrice ? `Suggested: ₹ ${suggestedPrice}` : ''}
                                    error={formErrors.customerPaidAmount}
                                    warning={isPaidAmountLow}
                                />
                                <InputField label="Final Invoice Number" name="invoiceNumber" value={formData.invoiceNumber} onChange={handleChange} error={formErrors.invoiceNumber} />
                            </div>
                        </div>
                        
                        <div className="p-6 border border-gray-200 rounded-lg">
                             <h4 className="text-lg font-semibold text-gray-700 mb-4">Product Image</h4>
                            <input type="file" name="image" id="image_update" accept="image/*" capture="environment" onChange={handleImageChange} className="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100"/>
                            {compressing && <div className="mt-4 flex items-center text-sm text-gray-600"><Spinner size="sm" /><span className="ml-2">Compressing image...</span></div>}
                            {imagePreview && !compressing && (
                                <div className="mt-4">
                                    <img src={imagePreview} crossOrigin="anonymous" alt="Product Preview" className="max-h-48 rounded-lg border border-gray-300 p-1"/>
                                </div>
                            )}
                        </div>

                    </div>
                    <div className="px-6 py-4 bg-gray-50 border-t flex justify-end items-center space-x-4 sticky bottom-0 z-10">
                        <button type="button" onClick={onClose} className="py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                            Cancel
                        </button>
                        <button type="submit" disabled={submitting} className="inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 disabled:bg-purple-300">
                             {submitting ? <><Spinner size="sm" /> Updating...</> : 'Save Changes'}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    );
};


// === From components/ServiceDataTable.tsx (REFACTORED) ===
const normalizeDateString = (dateInput) => {
    if (!dateInput) return '';
    const dateStr = String(dateInput).trim();
    if (/^\d{4}-\d{2}-\d{2}/.test(dateStr)) {
        return dateStr.substring(0, 10);
    }
    return '';
};
const getStatusColor = (status) => {
    switch (status) {
        case 'New':
            return 'bg-blue-100 text-blue-800';

        case 'In Service':
            return 'bg-yellow-100 text-yellow-800';

        case 'Completed':
            return 'bg-green-100 text-green-800';

        case 'Informed to Customer':
            return 'bg-indigo-100 text-indigo-800';

        case 'Delivered to Customer':
            return 'bg-emerald-100 text-emerald-800'; // 🔥 Better than gray

        default:
            return 'bg-gray-100 text-gray-800';
    }
}
const ServiceDataTable = ({ services, onEdit, onDownload, onComplete, initialFilters, servicemenNames, onDataRefresh }) => {
    const [searchTerm, setSearchTerm] = useState('');
    const [slipNoFilter, setSlipNoFilter] = useState('');
    const [previewImageUrl, setPreviewImageUrl] = useState(null);
    const [statusFilter, setStatusFilter] = useState('All');
    const [servicemanFilter, setServicemanFilter] = useState('All');
    const [startDate, setStartDate] = useState('');
    const [endDate, setEndDate] = useState('');
    const [sortConfig, setSortConfig] = useState({ key: 'date', direction: 'descending' });
    const [selectedRows, setSelectedRows] = useState([]);
    const [bulkModal, setBulkModal] = useState({ open: false, action: null }); // action: 'InService' | 'Completed'
    const [bulkServiceman, setBulkServiceman] = useState('');
    const [bulkLoading, setBulkLoading] = useState(false);

    useEffect(() => {
        if(initialFilters && initialFilters.status) {
            setStatusFilter(initialFilters.status);
        }
    }, [initialFilters]);

    const servicemenFilterOptions = useMemo(() => {
        return ['All', ...servicemenNames];
    }, [servicemenNames]);

    const sortedAndFilteredServices = useMemo(() => {
        let filteredData = [...services].filter(service =>
    typeof service.slipNo === "number" || /^\d+$/.test(service.slipNo)
);
        
        if (Array.isArray(statusFilter) && statusFilter.length > 0) {
            filteredData = filteredData.filter(s => statusFilter.includes(s.serviceStatus));
        } else if (typeof statusFilter === 'string' && statusFilter !== 'All') {
            filteredData = filteredData.filter(s => s.serviceStatus === statusFilter);
        }

        if (servicemanFilter !== 'All') {
            filteredData = filteredData.filter(s => s.servicemanName === servicemanFilter);
        }
        if (slipNoFilter.trim()) {
            const lowercasedFilter = slipNoFilter.trim().toLowerCase();
            filteredData = filteredData.filter(s =>
                s.slipNo && s.slipNo.toString().toLowerCase().includes(lowercasedFilter)
            );
        }
        if (startDate || endDate) {
    filteredData = filteredData.filter(s => {
        if (!s.date) return false;

        const serviceDateStr = normalizeDateString(s.date);

        if (startDate && serviceDateStr < startDate) return false;
        if (endDate && serviceDateStr > endDate) return false;

        return true;
    });
}
        if (searchTerm) {
            const lowercasedFilter = searchTerm.toLowerCase();
            filteredData = filteredData.filter(service =>
                Object.values(service).some(value =>
                    String(value).toLowerCase().includes(lowercasedFilter)
                )
            );
        }
        if (sortConfig.key) {
            filteredData.sort((a, b) => {
                const aVal = a[sortConfig.key];
                const bVal = b[sortConfig.key];
                if (aVal === null || aVal === undefined) return 1;
                if (bVal === null || bVal === undefined) return -1;
                let comparison = 0;
                if (sortConfig.key === 'slipNo' || sortConfig.key === 'estimateAmount') {
                    comparison = parseInt(String(aVal) || '0', 10) - parseInt(String(bVal) || '0', 10);
                } else {
                    comparison = String(aVal).toLowerCase().localeCompare(String(bVal).toLowerCase());
                }
                return sortConfig.direction === 'ascending' ? comparison : -comparison;
            });
        }
        return filteredData;
    }, [services, searchTerm, slipNoFilter, statusFilter, servicemanFilter, startDate, endDate, sortConfig]);
    
  

    const requestSort = (key) => {
        let direction = 'ascending';
        if (sortConfig.key === key && sortConfig.direction === 'ascending') {
            direction = 'descending';
        }
        setSortConfig({ key, direction });
    };

    const getSortIcon = (key) => {
        if (sortConfig.key !== key) {
            return <i className="fas fa-sort text-gray-400 ml-1"></i>;
        }
        if (sortConfig.direction === 'ascending') {
            return <i className="fas fa-sort-up ml-1 text-gray-800"></i>;
        }
        return <i className="fas fa-sort-down ml-1 text-gray-800"></i>;
    };

    const handleImageClick = (imageUrl) => {
        setPreviewImageUrl(getDirectGoogleDriveImageUrl(imageUrl));
    };

    const handleClosePreview = () => {
        setPreviewImageUrl(null);
    };
    
    
    // Step 1: User clicks a bulk action button → open confirmation modal
    const openBulkModal = (action) => {
        if (selectedRows.length === 0) {
            alert("Please select at least one record first.");
            return;
        }
        setBulkServiceman('');
        setBulkModal({ open: true, action });
    };

    // Step 2: Confirm inside modal → send to backend
    const confirmBulkUpdate = async () => {
        const status = bulkModal.action === 'InService' ? 'In Service' : 'Completed';
        if (bulkModal.action === 'InService' && !bulkServiceman.trim()) {
            alert("Please enter the serviceman name.");
            return;
        }
        setBulkLoading(true);
        try {
            // Ensure IDs are strings for consistent matching in GAS
            const idsToUpdate = selectedRows.map(id => String(id));
            
            await apiRequest('bulkUpdateStatus', 'POST', {
                ids: idsToUpdate,
                status: status,
                ...(bulkModal.action === 'InService' && { servicemanName: bulkServiceman.trim() })
            });
            
            setBulkModal({ open: false, action: null });
            setSelectedRows([]);
            setBulkServiceman('');
            
            // Refresh data instead of full page reload for better UX
            if (typeof onDataRefresh === 'function') {
                onDataRefresh();
            } else {
                window.location.reload();
            }
        } catch (error) {
            console.error("Bulk update error:", error);
            alert("Bulk update failed. Please check your connection and try again.");
        } finally {
            setBulkLoading(false);
        }
    };

    return (
        <div className="bg-white p-4 sm:p-6 lg:p-8 rounded-2xl shadow-lg">
            <h2 className="text-3xl font-bold text-gray-800 mb-6">Service Data</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-4 mb-4">
                <input
                    type="text"
                    placeholder="Search all fields..."
                    value={searchTerm}
                    onChange={e => setSearchTerm(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 lg:col-span-2"
                />
                <input
                    type="text"
                    placeholder="Filter by Slip No."
                    value={slipNoFilter}
                    onChange={e => setSlipNoFilter(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"
                />
                <select
                    value={typeof statusFilter === 'string' ? statusFilter : 'All'}
                    onChange={e => setStatusFilter(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 bg-white"
                >
                    <option value="All">All Statuses</option>
                    {Object.values(ServiceStatus).map(status => (
                        <option key={status} value={status}>{status}</option>
                    ))}
                </select>
                <select
                    value={servicemanFilter}
                    onChange={e => setServicemanFilter(e.target.value)}
                    className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 bg-white"
                >
                    {servicemenFilterOptions.map(name => (
                         <option key={name} value={name}>{name === 'All' ? 'All Servicemen' : name}</option>
                    ))}
                </select>
                <div className="grid grid-cols-2 gap-2">
                    <input
                        type="date"
                        value={startDate}
                        onChange={e => setStartDate(e.target.value)}
                        className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"
                        title="Filter by start date"
                    />
                    <input
                        type="date"
                        value={endDate}
                        onChange={e => setEndDate(e.target.value)}
                        className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"
                        title="Filter by end date"
                    />
                </div>
            </div>
            {/* Bulk Action Bar — only shown when rows are selected */}
            {selectedRows.length > 0 && (
                <div className="flex items-center gap-3 mb-4 px-4 py-3 bg-purple-50 border border-purple-200 rounded-xl">
                    <span className="text-sm font-semibold text-purple-700">
                        <i className="fas fa-check-square mr-1"></i>
                        {selectedRows.length} record{selectedRows.length > 1 ? 's' : ''} selected
                    </span>
                    <div className="flex gap-2 ml-2">
                        <button
                            onClick={() => openBulkModal('InService')}
                            className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-lg transition-colors"
                        >
                            <i className="fas fa-tools"></i>
                            Mark as In Service
                        </button>
                        <button
                            onClick={() => openBulkModal('Completed')}
                            className="flex items-center gap-2 px-4 py-2 bg-green-600 hover:bg-green-700 text-white text-sm font-medium rounded-lg transition-colors"
                        >
                            <i className="fas fa-check-circle"></i>
                            Mark as Completed
                        </button>
                    </div>
                    <button
                        onClick={() => setSelectedRows([])}
                        className="ml-auto text-sm text-gray-500 hover:text-gray-700 underline"
                    >
                        Clear selection
                    </button>
                </div>
            )}

            {/* Bulk Action Confirmation Modal */}
            {bulkModal.open && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-40">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 p-6">
                        <div className="flex items-center gap-3 mb-4">
                            {bulkModal.action === 'InService' ? (
                                <div className="w-10 h-10 rounded-full bg-blue-100 flex items-center justify-center">
                                    <i className="fas fa-tools text-blue-600"></i>
                                </div>
                            ) : (
                                <div className="w-10 h-10 rounded-full bg-green-100 flex items-center justify-center">
                                    <i className="fas fa-check-circle text-green-600"></i>
                                </div>
                            )}
                            <div>
                                <h3 className="text-lg font-bold text-gray-800">
                                    {bulkModal.action === 'InService' ? 'Mark as In Service' : 'Mark as Completed'}
                                </h3>
                                <p className="text-sm text-gray-500">
                                    {selectedRows.length} record{selectedRows.length > 1 ? 's' : ''} will be updated
                                </p>
                            </div>
                        </div>

                        {bulkModal.action === 'InService' && (
                            <div className="mb-5">
                                <label className="block text-sm font-medium text-gray-700 mb-1">
                                    Serviceman Name <span className="text-red-500">*</span>
                                </label>
                                <input
                                    type="text"
                                    list="bulk-serviceman-list"
                                    value={bulkServiceman}
                                    onChange={e => setBulkServiceman(e.target.value)}
                                    placeholder="Type or select serviceman..."
                                    autoFocus
                                    className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <datalist id="bulk-serviceman-list">
                                    {servicemenNames.map(name => (
                                        <option key={name} value={name} />
                                    ))}
                                </datalist>
                            </div>
                        )}

                        {bulkModal.action === 'Completed' && (
                            <p className="text-sm text-gray-600 mb-5 bg-green-50 border border-green-200 rounded-lg px-4 py-3">
                                All selected records will be marked as <strong>Completed</strong>. This action cannot be undone easily.
                            </p>
                        )}

                        <div className="flex gap-3 justify-end">
                            <button
                                onClick={() => setBulkModal({ open: false, action: null })}
                                disabled={bulkLoading}
                                className="px-4 py-2 text-sm text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors"
                            >
                                Cancel
                            </button>
                            <button
                                onClick={confirmBulkUpdate}
                                disabled={bulkLoading}
                                className={`px-5 py-2 text-sm font-semibold text-white rounded-lg transition-colors flex items-center gap-2 ${bulkModal.action === 'InService' ? 'bg-blue-600 hover:bg-blue-700' : 'bg-green-600 hover:bg-green-700'} disabled:opacity-60`}
                            >
                                {bulkLoading ? (
                                    <><i className="fas fa-spinner fa-spin"></i> Updating...</>
                                ) : (
                                    <><i className={bulkModal.action === 'InService' ? 'fas fa-tools' : 'fas fa-check'}></i> Confirm</>
                                )}
                            </button>
                        </div>
                    </div>
                </div>
            )}
            <div className="overflow-x-auto">
                <table className="min-w-full divide-y divide-gray-200">
                    <thead className="bg-gray-50">
                        <tr>
                        <th className="px-4 py-3">
    <input
        type="checkbox"
        onChange={(e) => {
            if (e.target.checked) {
                setSelectedRows(sortedAndFilteredServices.map(s => s.serviceId || s.rowIndex));
            } else {
                setSelectedRows([]);
            }
        }}
    />
</th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Image</th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" onClick={() => requestSort('slipNo')}>
                                Slip No {getSortIcon('slipNo')}
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" onClick={() => requestSort('date')}>
                                Date {getSortIcon('date')}
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" onClick={() => requestSort('customerName')}>
                                Customer {getSortIcon('customerName')}
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" onClick={() => requestSort('productName')}>
                                Product {getSortIcon('productName')}
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" onClick={() => requestSort('servicemanName')}>
                                Serviceman {getSortIcon('servicemanName')}
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Service Type</th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider cursor-pointer hover:bg-gray-100" onClick={() => requestSort('serviceStatus')}>
                                Status {getSortIcon('serviceStatus')}
                            </th>
                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Actions</th>
                        </tr>
                    </thead>
                    <tbody className="bg-white divide-y divide-gray-200">
                        {sortedAndFilteredServices.map(service => (
                            <tr key={`${service.serviceId || service.rowIndex}`}>
                            <td className="px-4 py-4">
    <input
        type="checkbox"
        checked={selectedRows.includes(service.serviceId || service.rowIndex)}
        onChange={(e) => {
            const id = service.serviceId || service.rowIndex;
            if (e.target.checked) {
                setSelectedRows(prev => [...prev, id]);
            } else {
                setSelectedRows(prev => prev.filter(item => item !== id));
            }
        }}
    />
</td>
                                <td className="px-4 py-4 whitespace-nowrap">
                                    {service.imageUrl ? (
                                        <img
                                            src={getDirectGoogleDriveImageUrl(service.imageUrl)}
                                            crossOrigin="anonymous"
                                            alt={String(service.productName)}
                                            className="w-12 h-12 object-cover rounded-md cursor-pointer hover:opacity-80 transition-opacity"
                                            onClick={() => handleImageClick(service.imageUrl)}
                                        />
                                    ) : (
                                        <div className="w-12 h-12 bg-gray-100 rounded-md flex items-center justify-center text-gray-400">
                                            <i className="fas fa-image"></i>
                                        </div>
                                    )}
                                </td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{String(service.slipNo)}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-500">{String(service.date)}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-700">
                                    <div className="font-medium">{String(service.customerName)}</div>
                                    <div>{String(service.contact)}</div>
                                </td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-700">
                                    <div className="font-medium">{String(service.productName)}</div>
                                    <div>{String(service.brand)}</div>
                                </td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm text-gray-500">{String(service.servicemanName || '-')}</td>
                                <td className="px-4 py-4 text-sm text-gray-500 max-w-xs truncate" title={service.serviceType}>{String(service.serviceType)}</td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm">
                                    <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(service.serviceStatus)}`}>
                                        {String(service.serviceStatus)}
                                    </span>
                                </td>
                                <td className="px-4 py-4 whitespace-nowrap text-sm font-medium">
                                    <div className="flex items-center space-x-4">
                                        {service.customerName === '--SKIPPED--' ? (
                                            <button onClick={() => onComplete(service)} className="text-blue-600 hover:text-blue-900 flex items-center" title="Complete Skipped Entry">
                                                <i className="fas fa-file-signature"></i>
                                            </button>
                                        ) : (
                                            <button onClick={() => onEdit(service)} className="text-purple-600 hover:text-purple-900 flex items-center" title="Edit service">
                                                <i className="fas fa-pencil-alt"></i>
                                            </button>
                                        )}
                                        <button onClick={() => onDownload(service)} className="text-green-600 hover:text-green-900 flex items-center" title="Download Slip">
                                            <i className="fas fa-download"></i>
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        ))}
                    </tbody>
                </table>
                 {sortedAndFilteredServices.length === 0 && (
                    <div className="text-center py-8 text-gray-500">
                        <p className="font-semibold">No service records found.</p>
                        <p className="text-sm mt-1">Try adjusting your search or filters.</p>
                    </div>
                )}
            </div>
            {previewImageUrl && <ImagePreviewModal imageUrl={previewImageUrl} onClose={handleClosePreview} />}
        </div>
    );
};


// === From components/ServiceEntryForm.tsx (UPDATED with BUG FIX) ===
const initialFormData = {
    date: getIndiaDate(),
    customerName: '',
    contact: '',
    productName: '',
    brand: '',
    color: '',
    size: '',
    estimateAmount: '',
    warrantyInvoiceNumber: '',
    warrantyDate: '',
    servicemanName: '',
};
const ServiceEntryForm = ({ onSuccess, onCompletionSuccess, serviceToComplete: serviceToCompleteProp, serviceOptions, servicemenNames }) => {
    const [formData, setFormData] = useState(initialFormData);
    const [slipNo, setSlipNo] = useState('');
    const [fetchedSlipNo, setFetchedSlipNo] = useState(null);
    const [loadingSlip, setLoadingSlip] = useState(true);
    const [submitting, setSubmitting] = useState(false);
    const [error, setError] = useState(null);
    const [formErrors, setFormErrors] = useState({});
    const [imagePreview, setImagePreview] = useState(null);
    const [imageData, setImageData] = useState(null);
    const [compressing, setCompressing] = useState(false);
    const [selectedServices, setSelectedServices] = useState([]);
    const [warrantyStatus, setWarrantyStatus] = useState('Non-Warranty');
    const [isCompletionMode, setIsCompletionMode] = useState(false);
    const [serviceToComplete, setServiceToComplete] = useState(null);

    const resetForm = useCallback((newSlip) => {
        setFormData(initialFormData);
        setSlipNo(newSlip ? newSlip.toString() : '');
        setSelectedServices([]);
        setImageData(null);
        setImagePreview(null);
        setWarrantyStatus('Non-Warranty');
        setError(null);
        setFormErrors({});
        setIsCompletionMode(false);
        setServiceToComplete(null);
        const formElement = document.getElementById('service-entry-form');
        if (formElement) formElement.reset();
    }, []);

    const fetchSlip = useCallback(async () => {
        setLoadingSlip(true);
        try {
            const lastSlip = await getLastSlipNumber();
            const nextSlip = lastSlip + 1;
            setSlipNo(nextSlip.toString());
            setFetchedSlipNo(nextSlip);
        } catch (err) {
            setError('Failed to fetch slip number. Please try again.');
            console.error(err);
        } finally {
            setLoadingSlip(false);
        }
    }, []);

    const setupCompletionMode = (service) => {
        setIsCompletionMode(true);
        setServiceToComplete(service);
        setLoadingSlip(false);
        setSlipNo(String(service.slipNo));
        setFetchedSlipNo(null); // Not relevant in completion mode
        setFormData(initialFormData); // Start with a fresh form
        setSelectedServices([]);
        setImageData(null);
        setImagePreview(null);
        setWarrantyStatus('Non-Warranty');
        setError(null);
        setFormErrors({});
    };

    useEffect(() => {
        if (serviceToCompleteProp) {
            setupCompletionMode(serviceToCompleteProp);
        } else {
            fetchSlip();
        }
    }, [serviceToCompleteProp, fetchSlip]);
    
    const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData(prev => ({...prev, [name]: value}));
        if (formErrors[name]) {
            setFormErrors(prev => ({ ...prev, [name]: null }));
        }
    };
    
    const handleImageChange = async (e) => {
        const file = e.target.files?.[0];
        if (file) {
            setCompressing(true);
            setError(null);
            try {
                const compressed = await compressImage(file);
                const newFileName = file.name.replace(/\.[^/.]+$/, "") + ".jpeg";
                setImageData({
                    base64: compressed.base64,
                    name: newFileName,
                    mimeType: compressed.mimeType,
                });
                setImagePreview(compressed.dataUrl);
            } catch (err) {
                 setError('Failed to process image. Please select a different file.');
                 console.error("Image compression error:", err);
                 setImageData(null);
                 setImagePreview(null);
            } finally {
                setCompressing(false);
            }
        } else {
            setImageData(null);
            setImagePreview(null);
        }
    };
    
    const createPlaceholderPayload = (slip) => {
        return {
            date: getIndiaDate(),
            slipNo: slip.toString(),
            customerName: '--SKIPPED--',
            contact: '',
            productName: '',
            brand: '',
            colorAndSize: '',
            serviceType: '',
            warrantyStatus: 'Non-Warranty',
            estimateAmount: '',
            warrantyInvoiceNumber: '',
            warrantyDate: '',
            serviceStatus: 'New',
            servicemanAmount: '',
            customerPaidAmount: '',
            invoiceNumber: '',
            servicemanName: '',
        };
    };

    const validateForm = () => {
        const errors = {};
        if (formData.customerName.trim() === '') {
            errors.customerName = "Customer name is required.";
        }
        if (!/^\d{10}$/.test(formData.contact)) {
            errors.contact = "Contact number must be exactly 10 digits.";
        }
        if (formData.estimateAmount && parseFloat(formData.estimateAmount) < 0) {
            errors.estimateAmount = "Estimate amount cannot be negative.";
        }
        return errors;
    };
    
    const OWNCHAT_WEBHOOK_URL =
  "https://api.ownchat.app/apps/699d38d6db3905a8933ff27a/events/699d38d6db3905a8933ff27b";

const sendSlipWhatsAppMessage = async (
  customerName: string,
  contact: string,
  slipNumber: string
) => {
  try {
    // Format phone
    let formattedPhone = contact.replace(/\D/g, "");
    if (formattedPhone.length === 10) {
      formattedPhone = "91" + formattedPhone;
    }

    // Format date like 24-Feb-2026
    const today = new Date();
    const formattedDate = today
      .toLocaleDateString("en-GB", {
        day: "2-digit",
        month: "short",
        year: "numeric",
      })
      .replace(/ /g, "-");

    const payload = {
      event_type: "Store_Service", // same working event
      timestamp: new Date().toISOString(),
      data: {
        recipientPhone: formattedPhone,
        customerName: customerName,
        slipNumber: slipNumber,
        slipDate: formattedDate,
      },
    };

    const response = await fetch(OWNCHAT_WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify(payload),
    });

    if (!response.ok) {
      console.error("WhatsApp trigger failed");
    } else {
      console.log("WhatsApp triggered successfully");
    }
  } catch (error) {
    console.error("WhatsApp error:", error);
  }
};

    const handleSubmit = async (e) => {
        e.preventDefault();
        
        const errors = validateForm();
        if (Object.keys(errors).length > 0) {
            setFormErrors(errors);
            return;
        }

        setSubmitting(true);
        setError(null);
        
        if (selectedServices.length === 0) {
            setError("Please select at least one service description.");
            setSubmitting(false);
            return;
        }

        try {
            if (isCompletionMode && serviceToComplete) {
                 if (!imageData) {
                    setError("Product image is required when completing an entry.");
                    setSubmitting(false);
                    return;
                }
                const payload = {
                    rowIndex: serviceToComplete.rowIndex, 
                    serviceId: serviceToComplete.serviceId, 
                    date: formData.date,
                    customerName: formData.customerName,
                    contact: formData.contact,
                    productName: formData.productName,
                    brand: formData.brand,
                    colorAndSize: `${formData.color} / ${formData.size}`,
                    serviceType: selectedServices.join(', '),
                    warrantyStatus: warrantyStatus,
                    estimateAmount: warrantyStatus === 'Non-Warranty' ? formData.estimateAmount : '',
                    warrantyInvoiceNumber: warrantyStatus === 'Warranty' ? formData.warrantyInvoiceNumber : '',
                    warrantyDate: warrantyStatus === 'Warranty' ? formData.warrantyDate : '',
                    image: imageData.base64,
                    imageName: imageData.name,
                    imageMimeType: imageData.mimeType,
                    serviceStatus: 'New', 
                };
                
                await updateService(payload);
                alert('Service entry completed successfully!');
                resetForm();
                onCompletionSuccess();

            } else {
                if (fetchedSlipNo === null) {
                    setError("Could not determine next slip number. Please refresh.");
                    setSubmitting(false);
                    return;
                }
                const enteredSlipNo = parseInt(slipNo, 10);
                if (isNaN(enteredSlipNo) || enteredSlipNo < fetchedSlipNo) {
                    setError(`Slip number cannot be less than the next available number (${fetchedSlipNo}).`);
                    setSubmitting(false);
                    return;
                }

                // Create placeholder entries if slip number was skipped
                if (enteredSlipNo > fetchedSlipNo) {
                    for (let i = fetchedSlipNo; i < enteredSlipNo; i++) {
                        await submitService(createPlaceholderPayload(i));
                    }
                }

                const payload = {
                    date: formData.date,
                    slipNo: slipNo,
                    customerName: formData.customerName,
                    contact: formData.contact,
                    productName: formData.productName,
                    brand: formData.brand,
                    colorAndSize: `${formData.color} / ${formData.size}`,
                    serviceType: selectedServices.join(', '),
                    warrantyStatus: warrantyStatus,
                    estimateAmount: warrantyStatus === 'Non-Warranty' ? formData.estimateAmount : '',
                    warrantyInvoiceNumber: warrantyStatus === 'Warranty' ? formData.warrantyInvoiceNumber : '',
                    warrantyDate: warrantyStatus === 'Warranty' ? formData.warrantyDate : '',
                    serviceStatus: 'New',
                    servicemanAmount: '',
                    customerPaidAmount: '',
                    invoiceNumber: '',
                    servicemanName: formData.servicemanName || '',
                };
                if (imageData) {
                    payload.image = imageData.base64;
                    payload.imageName = imageData.name;
                    payload.imageMimeType = imageData.mimeType;
                }

                const response = await submitService(payload);
                await sendSlipWhatsAppMessage(
  formData.customerName,
  formData.contact,
  slipNo
);
                const { image, imageName, imageMimeType, ...serviceDataFromPayload } = payload;
                const newServiceData = {
                    ...serviceDataFromPayload,
                    serviceId: response.serviceId,
                    rowIndex: response.rowIndex, // Assume API returns this
                    imageUrl: imagePreview || '',
                };
                
                const nextSlip = enteredSlipNo + 1;
                resetForm(nextSlip);
                setFetchedSlipNo(nextSlip);
                onSuccess(newServiceData);
            }
        } catch (err) {
            const errorMessage = err instanceof Error ? err.message : 'An unknown error occurred.';
            setError(`Submission failed: ${errorMessage}`);
            console.error(err);
        } finally {
            setSubmitting(false);
        }
    };
    
    return (
         <div className="max-w-4xl mx-auto bg-white p-8 rounded-2xl shadow-lg">
            <h2 className="text-3xl font-bold text-gray-800 mb-2 text-center">
                {isCompletionMode ? `Complete Service Entry (Slip No: ${slipNo})` : 'New Service Entry'}
            </h2>
            <p className="text-center text-gray-500 mb-8">
                {isCompletionMode ? 'Fill in the remaining details for this service request.' : 'Fill in the details below to create a new service request.'}
            </p>
            
            <form onSubmit={handleSubmit} id="service-entry-form" className="space-y-6">
                 {error && <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg" role="alert">{error}</div>}
                
                <div className="p-6 border border-gray-200 rounded-lg">
                    <h3 className="text-lg font-semibold text-gray-700 mb-4 flex items-center"><i className="fas fa-info-circle mr-3 text-purple-500"></i>General Details</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label htmlFor="date" className="block text-sm font-medium text-gray-700">Date *</label>
                            <input type="date" name="date" id="date" value={formData.date} onChange={handleInputChange} required className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"/>
                        </div>
                        <div>
                            <label htmlFor="slipNo" className="block text-sm font-medium text-gray-700">Slip No *</label>
                            {loadingSlip ? (
                                <div className="mt-1 flex items-center w-full h-10 px-3 py-2 bg-gray-100 border border-gray-300 rounded-md"><Spinner size="sm" /></div>
                            ) : (
                                <input 
                                    type="number" 
                                    name="slipNo" 
                                    id="slipNo" 
                                    value={slipNo} 
                                    onChange={(e) => setSlipNo(e.target.value)} 
                                    required
                                    disabled={isCompletionMode}
                                    className={`mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 ${isCompletionMode ? 'bg-gray-100' : ''}`}
                                />
                            )}
                        </div>
                    </div>
                </div>

                <div className="p-6 border border-gray-200 rounded-lg">
                    <h3 className="text-lg font-semibold text-gray-700 mb-4 flex items-center"><i className="fas fa-user-tag mr-3 text-purple-500"></i>Customer & Product Information</h3>
                     <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <InputField label="Customer Name *" name="customerName" value={formData.customerName} onChange={handleInputChange} required error={formErrors.customerName}/>
                        <InputField label="Contact Number *" name="contact" value={formData.contact} onChange={handleInputChange} required error={formErrors.contact} />
                        <InputField label="Product Name *" name="productName" value={formData.productName} onChange={handleInputChange} required />
                        <InputField label="Brand" name="brand" value={formData.brand} onChange={handleInputChange} />
                        <InputField label="Color" name="color" value={formData.color} onChange={handleInputChange} />
                        <InputField label="Size" name="size" value={formData.size} onChange={handleInputChange} />
                    </div>
                </div>

                <div className="p-6 border border-gray-200 rounded-lg">
                    <h3 className="text-lg font-semibold text-gray-700 mb-4 flex items-center"><i className="fas fa-shield-alt mr-3 text-purple-500"></i>Service & Warranty</h3>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                             <label className="block text-sm font-medium text-gray-700">Warranty Status</label>
                             <select value={warrantyStatus} onChange={(e) => setWarrantyStatus(e.target.value)} className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500">
                                <option value="Non-Warranty">Non-Warranty</option>
                                <option value="Warranty">Warranty</option>
                            </select>
                        </div>
                        {warrantyStatus === 'Non-Warranty' ? (
                            <InputField label="Estimate Amount" name="estimateAmount" type="number" value={formData.estimateAmount} onChange={handleInputChange} error={formErrors.estimateAmount}/>
                        ) : (
                            <>
                                <div>
                                    <label htmlFor="warrantyInvoiceNumber" className="block text-sm font-medium text-gray-700">Warranty Invoice Number</label>
                                    <input type="text" name="warrantyInvoiceNumber" id="warrantyInvoiceNumber" value={formData.warrantyInvoiceNumber} onChange={handleInputChange} className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"/>
                                </div>
                                <div>
                                    <label htmlFor="warrantyDate" className="block text-sm font-medium text-gray-700">Warranty Date</label>
                                    <input type="date" name="warrantyDate" id="warrantyDate" value={formData.warrantyDate} onChange={handleInputChange} className="mt-1 block w-full px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"/>
                                </div>
                            </>
                        )}
                    </div>
                     <div className="mt-6">
                        <label className="block text-sm font-medium text-gray-700">Service Description *</label>
                        <MultiSelectDropdown
                            options={serviceOptions}
                            selectedOptions={selectedServices}
                            onChange={setSelectedServices}
                        />
                    </div>
                </div>

                <div className="p-6 border border-gray-200 rounded-lg">
                    <h3 className="text-lg font-semibold text-gray-700 mb-4 flex items-center"><i className="fas fa-camera mr-3 text-purple-500"></i>Product Image</h3>
                    <label htmlFor="image" className="block text-sm font-medium text-gray-700">{isCompletionMode ? 'Upload Image *' : 'Upload Image (Optional)'}</label>
                    <input type="file" name="image" id="image" accept="image/*" capture="environment" onChange={handleImageChange} required={isCompletionMode} className="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-purple-50 file:text-purple-700 hover:file:bg-purple-100"/>
                     {compressing && <div className="mt-4 flex items-center text-sm text-gray-600"><Spinner size="sm" /><span className="ml-2">Compressing image...</span></div>}
                    {imagePreview && !compressing && (
                        <div className="mt-4">
                            <img src={imagePreview} alt="Product Preview" className="max-h-48 rounded-lg border border-gray-300 p-1"/>
                        </div>
                    )}
                </div>

                <div className="pt-5 flex justify-end space-x-4">
                    <button type="button" onClick={() => resetForm(fetchedSlipNo ?? undefined)} className="py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500">
                        Clear Form
                    </button>
                    <button type="submit" disabled={submitting || loadingSlip} className="inline-flex justify-center py-2 px-6 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 disabled:bg-purple-300">
                        {submitting ? <><Spinner size="sm" /> Submitting...</> : (isCompletionMode ? 'Complete Entry' : 'Create Service Slip')}
                    </button>
                </div>
            </form>
        </div>
    );
};


// === NEW: Dashboard View ===
const Dashboard = ({ services, onNavigateWithFilters }) => {
    const statusCounts = useMemo(() => {
        const counts = { 'New': 0, 'In Service': 0, 'Completed': 0, 'Informed to Customer': 0, 'Delivered to Customer': 0, 'Total': 0 };
        services.forEach(service => {
            if (counts[service.serviceStatus] !== undefined) {
                counts[service.serviceStatus]++;
            }
            counts['Total']++;
        });
        return counts;
    }, [services]);
    
    const readyForDeliveryCount = statusCounts.Completed + statusCounts['Informed to Customer'];

    const kpiData = [
        { title: 'Total Services', value: statusCounts.Total, icon: 'fas fa-cogs', color: 'bg-blue-500', filter: null },
        { title: 'New Requests', value: statusCounts.New, icon: 'fas fa-bell', color: 'bg-yellow-500', filter: 'New' },
        { title: 'In Progress', value: statusCounts['In Service'], icon: 'fas fa-sync-alt', color: 'bg-indigo-500', filter: 'In Service' },
        { title: 'Ready for Delivery', value: readyForDeliveryCount, icon: 'fas fa-check-circle', color: 'bg-green-500', filter: ['Completed', 'Informed to Customer'] },
    ];
    
    return (
        <div className="bg-white p-8 rounded-2xl shadow-lg">
            <h2 className="text-3xl font-bold text-gray-800 mb-6">Dashboard Overview</h2>
            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                {kpiData.map(kpi => (
                    <div 
                        key={kpi.title} 
                        className={`${kpi.color} text-white p-6 rounded-xl shadow-md flex items-center ${kpi.filter ? 'cursor-pointer hover:opacity-90 transition-opacity' : ''}`}
                        onClick={() => kpi.filter && onNavigateWithFilters({ status: kpi.filter })}
                    >
                        <div className="mr-4 text-3xl opacity-75">
                            <i className={kpi.icon}></i>
                        </div>
                        <div>
                            <div className="text-4xl font-extrabold">{String(kpi.value)}</div>
                            <div className="text-sm font-medium uppercase tracking-wider">{String(kpi.title)}</div>
                        </div>
                    </div>
                ))}
            </div>
            <div className="mt-8">
                 <h3 className="text-xl font-semibold text-gray-700 mb-4">Service Status Breakdown</h3>
                <div className="flex flex-col space-y-2">
                    {Object.entries(statusCounts).filter(([key]) => key !== 'Total').map(([status, count]) => (
                         <div key={status}>
                             <div className="flex justify-between items-center text-sm mb-1">
                                <span className="font-medium text-gray-600">{String(status)}</span>
                                <span className="text-gray-500">{String(count)} of {String(statusCounts.Total)}</span>
                             </div>
                             <div className="w-full bg-gray-200 rounded-full h-2.5">
                                 <div 
                                    className={`${getStatusColor(status).split(' ')[0]} h-2.5 rounded-full`}
                                    style={{ width: `${statusCounts.Total > 0 ? (count / statusCounts.Total) * 100 : 0}%` }}
                                 ></div>
                             </div>
                         </div>
                    ))}
                </div>
            </div>
        </div>
    );
};

                                    <td className="px-3 py-2">
                                        {s.customerName}

});
