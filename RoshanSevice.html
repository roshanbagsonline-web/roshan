const ServicemanPayouts = ({ services, servicemen, onDataRefresh }) => {
    const [activeTab, setActiveTab] = useState('pending');
    const [selectedServiceman, setSelectedServiceman] = useState('');
    const [selectedServices, setSelectedServices] = useState({});
    const [payoutSlipData, setPayoutSlipData] = useState(null);
    const [error, setError] = useState(null);
    const [historyServicemanFilter, setHistoryServicemanFilter] = useState('All');
    const [historyStartDate, setHistoryStartDate] = useState('');
    const [historyEndDate, setHistoryEndDate] = useState('');
    const [viewingPayoutDetails, setViewingPayoutDetails] = useState(null);

    // PENDING Payouts Logic
    const pendingServices = useMemo(() => {
        if (!selectedServiceman) return [];
        return services.filter(s =>
            s.servicemanName === selectedServiceman &&
            s.servicemanAmount && parseFloat(s.servicemanAmount) > 0 &&
            (s.serviceStatus === 'Completed' || s.serviceStatus === 'Delivered to Customer') &&
            s.servicemanPayoutStatus !== 'Paid'
        );
    }, [selectedServiceman, services]);

    const servicesForPayout = useMemo(() => {
        return pendingServices.filter(s => selectedServices[String(s.rowIndex)]);
    }, [selectedServices, pendingServices]);

    const totalPayoutAmount = useMemo(() => {
        return servicesForPayout.reduce((total, s) => total + parseFloat(s.servicemanAmount), 0);
    }, [servicesForPayout]);

    // HISTORY Payouts Logic
    const payoutHistory = useMemo(() => {
        const paidServices = services.filter(s => s.servicemanPayoutStatus === 'Paid' && s.servicemanPayoutId);
        const groupedByPayoutId = paidServices.reduce((acc, service) => {
            const id = service.servicemanPayoutId;
            if (!acc[id]) {
                const smObj = (servicemen || []).find(sm => sm.servicePerson === service.servicemanName);
                acc[id] = {
                    payoutId: id,
                    serviceman: smObj || service.servicemanName,
                    servicemanName: service.servicemanName,
                    payoutDate: service.servicemanPayoutDate,
                    services: [],
                    totalAmount: 0,
                };
            }
            acc[id].services.push(service);
            const amt = parseFloat(service.servicemanAmount || '0');
            acc[id].totalAmount += isNaN(amt) ? 0 : amt;
            return acc;
        }, {});
        return Object.values(groupedByPayoutId).sort((a, b) => (b.payoutDate || '').localeCompare(a.payoutDate || ''));
    }, [services, servicemen]);

    const filteredHistory = useMemo(() => {
        return payoutHistory.filter(payout => {
            if (historyServicemanFilter !== 'All' && payout.servicemanName !== historyServicemanFilter) return false;
            if (historyStartDate && payout.payoutDate < historyStartDate) return false;
            if (historyEndDate && payout.payoutDate > historyEndDate) return false;
            return true;
        });
    }, [payoutHistory, historyServicemanFilter, historyStartDate, historyEndDate]);

    const generatePayoutId = () => {
        const now = new Date(
            new Date().toLocaleString("en-US", { timeZone: "Asia/Kolkata" })
        );
        const year = now.getFullYear();
        const month = String(now.getMonth() + 1).padStart(2, '0');
        const day = String(now.getDate()).padStart(2, '0');
        const hours = String(now.getHours()).padStart(2, '0');
        const minutes = String(now.getMinutes()).padStart(2, '0');
        return `${year}${month}${day}${hours}${minutes}`;
    };

    const handleGeneratePayout = () => {
        if (servicesForPayout.length === 0) {
            alert('Please select at least one service to generate a payout slip.');
            return;
        }
        const smObj = servicemen.find(sm => sm.servicePerson === selectedServiceman);
        setPayoutSlipData({
            serviceman: smObj || selectedServiceman,
            services: servicesForPayout,
            total: totalPayoutAmount,
            payoutId: `TNG${generatePayoutId()}`
        });
    };

    const handleConfirmAndPay = async () => {
        if (!payoutSlipData) return;
        setError(null);
        const { services, payoutId } = payoutSlipData;
        try {
            const payoutDate = getIndiaDate();
            for (const service of services) {
                const payload = {
                    rowIndex: service.rowIndex,
                    servicemanPayoutStatus: 'Paid',
                    servicemanPayoutId: payoutId,
                    servicemanPayoutDate: payoutDate
                };
                await updateService(payload);
            }
            alert(`Successfully marked ${services.length} services as paid.`);
            setPayoutSlipData(null);
            setSelectedServices({});
            onDataRefresh();
        } catch (err) {
            const errorMessage = err instanceof Error ? err.message : 'An unknown error occurred.';
            setError(`Failed to mark services as paid: ${errorMessage}`);
            console.error(err);
        }
    };

    const pendingCountByServiceman = useMemo(() => {
        const countMap = {};
        services.forEach(service => {
            if (
                service.servicemanAmount &&
                parseFloat(service.servicemanAmount) > 0 &&
                (service.serviceStatus === 'Completed' ||
                 service.serviceStatus === 'Delivered to Customer') &&
                service.servicemanPayoutStatus !== 'Paid'
            ) {
                const name = service.servicemanName;
                countMap[name] = (countMap[name] || 0) + 1;
            }
        });
        return countMap;
    }, [services]);

    const servicemenList = useMemo(() => {
        return servicemen
            .filter(sm => sm.servicePerson && sm.servicePerson.trim() !== '')
            .map(sm => ({
                ...sm,
                count: pendingCountByServiceman[sm.servicePerson] || 0
            }))
            .sort((a, b) => a.servicePerson.localeCompare(b.servicePerson));
    }, [servicemen, pendingCountByServiceman]);

    return (
        <div className="bg-white p-8 rounded-2xl shadow-lg">
            <h2 className="text-3xl font-bold text-gray-800 mb-6">Serviceman Payouts</h2>
            {error && (
                <div className="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-lg mb-4" role="alert">
                    {error}
                </div>
            )}

            <div className="border-b border-gray-200 mb-6">
                <nav className="-mb-px flex space-x-6" aria-label="Tabs">
                    <button
                        onClick={() => setActiveTab('pending')}
                        className={`${activeTab === 'pending' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'} whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm`}
                    >
                        Pending Payouts
                    </button>
                    <button
                        onClick={() => setActiveTab('history')}
                        className={`${activeTab === 'history' ? 'border-purple-500 text-purple-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'} whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm`}
                    >
                        Payout History
                    </button>
                </nav>
            </div>

            {activeTab === 'pending' && (
                <div>
                    <div className="flex flex-col md:flex-row gap-4 mb-6">
                        <div className="w-full md:w-72">
                            <label htmlFor="serviceman-select" className="block text-sm font-medium text-gray-700">
                                Select Serviceman
                            </label>
                            <select
                                id="serviceman-select"
                                value={selectedServiceman}
                                onChange={e => {
                                    setSelectedServiceman(e.target.value);
                                    setSelectedServices({});
                                }}
                                className="mt-1 block w-full px-3 py-2 text-sm border-gray-300 rounded-md focus:ring-purple-500 focus:border-purple-500"
                            >
                                <option value="">-- Select a name --</option>
                                {servicemenList.map(sm => (
                                    <option key={sm.servicePerson} value={sm.servicePerson}>
                                        {sm.servicePerson} {sm.number ? `(${sm.number})` : ''} {sm.count > 0 ? `[${sm.count}]` : ''}
                                    </option>
                                ))}
                            </select>
                        </div>
                        <div className="flex items-end">
                            <button
                                onClick={handleGeneratePayout}
                                disabled={servicesForPayout.length === 0}
                                className="w-full md:w-auto inline-flex items-center justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 disabled:bg-purple-300"
                            >
                                Generate Payout Slip ({String(servicesForPayout.length)})
                            </button>
                        </div>
                    </div>
                    {selectedServiceman && (
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-4 py-3 text-left w-12">
                                            <input
                                                type="checkbox"
                                                onChange={(e) =>
                                                    e.target.checked
                                                        ? setSelectedServices(pendingServices.reduce((acc, s) => ({ ...acc, [String(s.rowIndex)]: true }), {}))
                                                        : setSelectedServices({})
                                                }
                                                checked={pendingServices.length > 0 && servicesForPayout.length === pendingServices.length}
                                                className="h-4 w-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500"
                                            />
                                        </th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Slip No</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Customer</th>
                                        <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Status</th>
                                        <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Amount</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {pendingServices.map(service => {
                                        const rowIndexKey = String(service.rowIndex);
                                        return (
                                            <tr key={rowIndexKey} className={`${selectedServices[rowIndexKey] ? 'bg-purple-50' : ''}`}>
                                                <td className="px-4 py-4">
                                                    <input
                                                        type="checkbox"
                                                        checked={!!selectedServices[rowIndexKey]}
                                                        onChange={() => setSelectedServices(prev => ({ ...prev, [rowIndexKey]: !prev[rowIndexKey] }))}
                                                        className="h-4 w-4 text-purple-600 border-gray-300 rounded focus:ring-purple-500"
                                                    />
                                                </td>
                                                <td className="px-4 py-4 font-medium">{String(service.slipNo)}</td>
                                                <td className="px-4 py-4">{String(service.date)}</td>
                                                <td className="px-4 py-4">{String(service.customerName)}</td>
                                                <td className="px-4 py-4">
                                                    <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${getStatusColor(String(service.serviceStatus))}`}>
                                                        {String(service.serviceStatus)}
                                                    </span>
                                                </td>
                                                <td className="px-4 py-4 text-right font-semibold">₹ {String(service.servicemanAmount)}</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                            {pendingServices.length === 0 && (
                                <p className="text-center py-8 text-gray-500">
                                    No pending payments found for {selectedServiceman}.
                                </p>
                            )}
                        </div>
                    )}
                </div>
            )}

            {activeTab === 'history' && (
                <div>
                    <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-4">
                        {/* FIXED: was servicemenNames (undefined), now uses servicemenList */}
                        <select
                            value={historyServicemanFilter}
                            onChange={e => setHistoryServicemanFilter(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500 bg-white"
                        >
                            <option value="All">All Servicemen</option>
                            {servicemenList.map(sm => (
                                <option key={sm.servicePerson} value={sm.servicePerson}>
                                    {sm.servicePerson}
                                </option>
                            ))}
                        </select>
                        <input
                            type="date"
                            value={historyStartDate}
                            onChange={e => setHistoryStartDate(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"
                            title="Filter by start date"
                        />
                        <input
                            type="date"
                            value={historyEndDate}
                            onChange={e => setHistoryEndDate(e.target.value)}
                            className="w-full px-4 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-purple-500 focus:border-purple-500"
                            title="Filter by end date"
                        />
                    </div>
                    <div className="overflow-x-auto">
                        <table className="min-w-full divide-y divide-gray-200">
                            <thead className="bg-gray-50">
                                <tr>
                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Payout ID</th>
                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Date Paid</th>
                                    <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase">Serviceman</th>
                                    <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Services</th>
                                    <th className="px-4 py-3 text-right text-xs font-medium text-gray-500 uppercase">Total Amount</th>
                                    <th className="px-4 py-3 text-center text-xs font-medium text-gray-500 uppercase">Actions</th>
                                </tr>
                            </thead>
                            <tbody className="bg-white divide-y divide-gray-200">
                                {filteredHistory.map(payout => (
                                    <tr key={payout.payoutId}>
                                        <td className="px-4 py-4 font-mono text-xs">{String(payout.payoutId)}</td>
                                        <td className="px-4 py-4">{String(payout.payoutDate)}</td>
                                        <td className="px-4 py-4 font-medium">{String(payout.servicemanName)}</td>
                                        <td className="px-4 py-4 text-center">{String(payout.services.length)}</td>
                                        <td className="px-4 py-4 text-right font-semibold">₹ {String((payout.totalAmount || 0).toFixed(2))}</td>
                                        <td className="px-4 py-4 text-center">
                                            <button
                                                onClick={() => setViewingPayoutDetails(payout)}
                                                className="text-purple-600 hover:text-purple-900"
                                            >
                                                View Details
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {filteredHistory.length === 0 && (
                            <p className="text-center py-8 text-gray-500">
                                No payout history found for the selected filters.
                            </p>
                        )}
                    </div>
                </div>
            )}

            {payoutSlipData && (
                <PayoutSlipModal
                    {...payoutSlipData}
                    onClose={() => setPayoutSlipData(null)}
                    onConfirmAndPay={handleConfirmAndPay}
                />
            )}
            {viewingPayoutDetails && (
                <PayoutHistoryDetailModal
                    payout={viewingPayoutDetails}
                    onClose={() => setViewingPayoutDetails(null)}
                />
            )}
        </div>
    );
};


const Settings = ({ onSettingsChange, onDataRefresh }) => {
    const SETTINGS_KEY = 'serviceHubPro_settings';

    const [markupPercentage, setMarkupPercentage] = useState(30);

    // Serviceman state
    const [servicemen, setServicemen] = useState([]);
    const [newServiceman, setNewServiceman] = useState({ name: '', number: '' });
    const [loadingServicemen, setLoadingServicemen] = useState(false);

    // Service details state
    const [services, setServices] = useState([]);
    const [newService, setNewService] = useState({ name: '' });
    const [loadingServices, setLoadingServices] = useState(false);

    const fetchSettingsData = useCallback(async () => {
        setLoadingServicemen(true);
        setLoadingServices(true);
        try {
            const smData = await getServicemen();
            setServicemen(smData.map((sm, index) => ({ id: index, name: sm.servicePerson, number: sm.number })));
            
            const svcData = await getServiceDetails();
            setServices(svcData.map((svc, index) => ({ id: index, name: svc })));
        } catch (e) {
            console.error("Could not load settings data from sheet.", e);
        } finally {
            setLoadingServicemen(false);
            setLoadingServices(false);
        }
    }, []);

    useEffect(() => {
        try {
            const savedSettings = localStorage.getItem(SETTINGS_KEY);
            if (savedSettings) {
                const settings = JSON.parse(savedSettings);
                if (settings.markupPercentage !== undefined) {
                    setMarkupPercentage(settings.markupPercentage);
                }
            }
        } catch (e) {
            console.error("Could not load markup settings.", e);
        }
        fetchSettingsData();
    }, [fetchSettingsData]);

    const handleSaveMarkup = () => {
        const settings = { markupPercentage: parseFloat(String(markupPercentage)) };
        try {
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            alert('Markup settings saved successfully!');
            if (onSettingsChange) onSettingsChange(settings);
        } catch (e) {
            alert('Failed to save markup settings.');
            console.error("Could not save markup settings.", e);
        }
    };

    // --- Serviceman handlers ---
    const handleAddServiceman = async () => {
        const name = newServiceman.name.trim();
        const number = newServiceman.number.trim();
        if (!name || !number) return alert('Please enter both name and number.');
        
        // Duplicate check
        const isDuplicate = servicemen.some(sm => sm.name.toLowerCase() === name.toLowerCase());
        if (isDuplicate) {
            return alert(`Duplicate data: Serviceman "${name}" already exists.`);
        }

        setLoadingServicemen(true);
        try {
            await addServiceman({ servicePerson: name, number: number });
            await fetchSettingsData();
            setNewServiceman({ name: '', number: '' });
            if (onDataRefresh) onDataRefresh();
        } catch (e) {
            alert('Failed to add serviceman to sheet.');
        } finally {
            setLoadingServicemen(false);
        }
    };

    const handleDeleteServiceman = async (name) => {
        if (!window.confirm(`Are you sure you want to delete serviceman "${name}"?`)) return;
        
        setLoadingServicemen(true);
        try {
            await deleteServiceman(name);
            await fetchSettingsData();
            if (onDataRefresh) onDataRefresh();
        } catch (e) {
            alert('Failed to delete serviceman from sheet.');
        } finally {
            setLoadingServicemen(false);
        }
    };

    // --- Service details handlers ---
    const handleAddService = async () => {
        const name = newService.name.trim();
        if (!name) return alert('Please enter a service name.');
        
        // Duplicate check
        const isDuplicate = services.some(svc => svc.name.toLowerCase() === name.toLowerCase());
        if (isDuplicate) {
            return alert(`Duplicate data: Service detail "${name}" already exists.`);
        }

        setLoadingServices(true);
        try {
            await addServiceDetail({ serviceDetail: name });
            await fetchSettingsData();
            setNewService({ name: '' });
            if (onDataRefresh) onDataRefresh();
        } catch (e) {
            alert('Failed to add service detail to sheet.');
        } finally {
            setLoadingServices(false);
        }
    };

    const handleDeleteService = async (name) => {
        if (!window.confirm(`Are you sure you want to delete service detail "${name}"?`)) return;
        
        setLoadingServices(true);
        try {
            await deleteServiceDetail(name);
            await fetchSettingsData();
            if (onDataRefresh) onDataRefresh();
        } catch (e) {
            alert('Failed to delete service detail from sheet.');
        } finally {
            setLoadingServices(false);
        }
    };

    return (
        <div className="bg-white p-8 rounded-2xl shadow-lg max-w-2xl mx-auto space-y-10">
            <h2 className="text-3xl font-bold text-gray-800">Application Settings</h2>

            {/* ── Markup Percentage ── */}
            <section className="space-y-4">
                <h3 className="text-xl font-semibold text-gray-700 border-b pb-2">Markup Settings</h3>
                <div>
                    <label htmlFor="markup" className="block text-sm font-medium text-gray-700">
                        Serviceman Amount Markup
                    </label>
                    <div className="mt-1 relative rounded-md shadow-sm">
                        <input
                            type="number"
                            id="markup"
                            className="focus:ring-purple-500 focus:border-purple-500 block w-full pl-4 pr-12 sm:text-sm border-gray-300 rounded-md"
                            placeholder="30"
                            value={String(markupPercentage)}
                            onChange={(e) => setMarkupPercentage(Number(e.target.value))}
                        />
                        <div className="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
                            <span className="text-gray-500 sm:text-sm">%</span>
                        </div>
                    </div>
                    <p className="mt-2 text-sm text-gray-500">
                        Used to calculate the suggested 'Customer Paid Amount' from 'Serviceman Amount'.
                    </p>
                </div>
                <div className="flex justify-end">
                    <button
                        onClick={handleSaveMarkup}
                        className="inline-flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500"
                    >
                        Save Markup Settings
                    </button>
                </div>
            </section>

            {/* ── Serviceman Management ── */}
            <section className="space-y-4">
                <h3 className="text-xl font-semibold text-gray-700 border-b pb-2">Serviceman Management </h3>

                <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Name</label>
                        <input
                            type="text"
                            placeholder="e.g. Roshan"
                            value={newServiceman.name}
                            onChange={(e) => setNewServiceman({ ...newServiceman, name: e.target.value })}
                            className="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm focus:ring-purple-500 focus:border-purple-500"
                        />
                    </div>
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Phone Number</label>
                        <input
                            type="tel"
                            placeholder="e.g. 95974 95674"
                            value={newServiceman.number}
                            onChange={(e) => setNewServiceman({ ...newServiceman, number: e.target.value })}
                            className="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm focus:ring-purple-500 focus:border-purple-500"
                        />
                    </div>
                </div>
                <button
                    onClick={handleAddServiceman}
                    disabled={loadingServicemen}
                    className="inline-flex items-center gap-2 py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 disabled:opacity-50"
                >
                    {loadingServicemen ? <Spinner size="sm" /> : '+ Add Serviceman'}
                </button>

                {loadingServicemen && <div className="flex justify-center py-4"><Spinner /></div>}
                {!loadingServicemen && servicemen.length > 0 && (
                    <ul className="divide-y divide-gray-200 border rounded-md overflow-hidden">
                        {servicemen.map((sm) => (
                            <li key={sm.id} className="flex items-center justify-between px-4 py-3 bg-gray-50 hover:bg-gray-100 transition-colors">
                                <div>
                                    <p className="text-sm font-medium text-gray-800">{sm.name}</p>
                                    <p className="text-xs text-gray-500">{sm.number}</p>
                                </div>
                                <button 
                                    onClick={() => handleDeleteServiceman(sm.name)}
                                    className="text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 transition-colors"
                                    title="Delete Serviceman"
                                >
                                    <i className="fas fa-trash-alt"></i>
                                </button>
                            </li>
                        ))}
                    </ul>
                )}
            </section>

            {/* ── Service Details ── */}
            <section className="space-y-4">
                <h3 className="text-xl font-semibold text-gray-700 border-b pb-2">Service Details(Repairs)</h3>

                <div className="grid grid-cols-1 gap-3">
                    <div>
                        <label className="block text-sm font-medium text-gray-700">Service Name</label>
                        <input
                            type="text"
                            placeholder="e.g. Stitching,Wheel"
                            value={newService.name}
                            onChange={(e) => setNewService({ ...newService, name: e.target.value })}
                            className="mt-1 block w-full border-gray-300 rounded-md shadow-sm sm:text-sm focus:ring-purple-500 focus:border-purple-500"
                        />
                    </div>
                </div>
                <button
                    onClick={handleAddService}
                    disabled={loadingServices}
                    className="inline-flex items-center gap-2 py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 disabled:opacity-50"
                >
                    {loadingServices ? <Spinner size="sm" /> : '+ Add Service'}
                </button>

                {loadingServices && <div className="flex justify-center py-4"><Spinner /></div>}
                {!loadingServices && services.length > 0 && (
                    <ul className="divide-y divide-gray-200 border rounded-md overflow-hidden">
                        {services.map((svc) => (
                            <li key={svc.id} className="flex items-center justify-between px-4 py-3 bg-gray-50 hover:bg-gray-100 transition-colors">
                                <div>
                                    <p className="text-sm font-medium text-gray-800">{svc.name}</p>
                                </div>
                                <button 
                                    onClick={() => handleDeleteService(svc.name)}
                                    className="text-red-500 hover:text-red-700 p-2 rounded-full hover:bg-red-50 transition-colors"
                                    title="Delete Service Detail"
                                >
                                    <i className="fas fa-trash-alt"></i>
                                </button>
                            </li>
                        ))}
                    </ul>
                )}
            </section>
        </div>
    );
};

// === Main App Component (UPDATED FOR RESPONSIVENESS) ===
const App = () => {
    const [activeView, setActiveView] = useState('dashboard');
    const [services, setServices] = useState([]);
    const [servicemen, setServicemen] = useState([]);
    const [serviceOptions, setServiceOptions] = useState([]); // Default to empty, strictly from sheet
    const [loading, setLoading] = useState(true);
    const [error, setError] = useState(null);
    const [selectedServiceForModal, setSelectedServiceForModal] = useState(null);
    const [isUpdateModalOpen, setIsUpdateModalOpen] = useState(false);
    const [isSlipModalOpen, setIsSlipModalOpen] = useState(false);
    const [isDownloadModalOpen, setIsDownloadModalOpen] = useState(false);
    const [initialDataFilters, setInitialDataFilters] = useState(null);
    const [serviceToComplete, setServiceToComplete] = useState(null);
    const [_, forceSettingsUpdate] = useState(0); // Dummy state to trigger re-renders
    const [isSidebarOpen, setIsSidebarOpen] = useState(false); // State for mobile sidebar

    const fetchAllData = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
            // Fetch servicemen and options first as they are small
            const [servicemenData, optionsData] = await Promise.all([
                getServicemen(),
                getServiceDetails()
            ]);
            setServicemen(servicemenData);
            if (optionsData) setServiceOptions(optionsData);

            // Then fetch the large services data
            const servicesData = await getAllServices();
            setServices(servicesData);
        } catch (err) {
            const errorMessage = err instanceof Error ? err.message : 'An unknown error occurred.';
            setError(`Failed to load data: ${errorMessage}`);
            console.error(err);
        } finally {
            setLoading(false);
        }
    }, []);
    
    useEffect(() => {
        fetchAllData();
    }, [fetchAllData]);
    
    const handleSettingsChange = () => {
        forceSettingsUpdate(c => c + 1);
        fetchAllData();
    };

    const handleFormSuccess = (newService) => {
        setSelectedServiceForModal(newService);
        setIsSlipModalOpen(true);
        fetchAllData();
    };

    const handleCompletionSuccess = () => {
        setActiveView('data');
        setServiceToComplete(null);
        fetchAllData();
    };
    
    const handleEditService = (service) => {
        setSelectedServiceForModal(service);
        setIsUpdateModalOpen(true);
    };

    const handleDownloadSlip = (service) => {
        setSelectedServiceForModal(service);
        setIsDownloadModalOpen(true);
    };

    const handleCompleteSkipped = (service) => {
        setServiceToComplete(service);
        setActiveView('entry');
    };
    
    const handleUpdateSuccess = () => {
        setIsUpdateModalOpen(false);
        setSelectedServiceForModal(null);
        fetchAllData();
    };

    const servicemenNames = useMemo(() => {
        // Strictly from Storage sheet only
        const namesFromStorage = servicemen.map(sm => sm.servicePerson);
        
        const names = new Set(namesFromStorage
            .filter(name => name && name.trim() !== ''));
        return Array.from(names).sort();
    }, [servicemen]);

    const navigateToDataViewWithFilters = (filters) => {
        setInitialDataFilters(filters);
        setActiveView('data');
    };

    const renderView = () => {
        switch (activeView) {
            case 'dashboard':
                return <Dashboard services={services} onNavigateWithFilters={navigateToDataViewWithFilters} />;
            case 'entry':
                return <ServiceEntryForm onSuccess={handleFormSuccess} onCompletionSuccess={handleCompletionSuccess} serviceToComplete={serviceToComplete} serviceOptions={serviceOptions} servicemenNames={servicemenNames} />;
            case 'data':
                return <ServiceDataTable services={services} onEdit={handleEditService} onDownload={handleDownloadSlip} onComplete={handleCompleteSkipped} initialFilters={initialDataFilters} servicemenNames={servicemenNames} onDataRefresh={fetchAllData} />;
            case 'payouts':
                return <ServicemanPayouts services={services} servicemen={servicemen} onDataRefresh={fetchAllData} />;
            case 'settings':
                return <Settings onSettingsChange={handleSettingsChange} onDataRefresh={fetchAllData}/>;
            default:
                return <div>Select a view</div>;
        }
    };

    const SidebarLink = ({ view, icon, label }) => (
        <button
            onClick={() => {
                setInitialDataFilters(null);
                if (view !== 'entry') {
                    setServiceToComplete(null);
                }
                setActiveView(view);
                setIsSidebarOpen(false); // Close sidebar on navigation
            }}
            className={`flex items-center w-full text-left px-4 py-3 rounded-lg transition-colors duration-200 ${
                activeView === view
                ? 'bg-purple-600 text-white shadow-md'
                : 'text-gray-600 hover:bg-gray-200 hover:text-gray-800'
            }`}
        >
            <i className={`${icon} fa-fw mr-4`}></i>
            <span className="font-medium">{label}</span>
        </button>
    );

    return (
        <div className="relative h-screen md:flex bg-gray-100 font-sans overflow-hidden">
            {/* Overlay for mobile */}
            {isSidebarOpen && (
                 <div 
                    className="fixed inset-0 bg-black bg-opacity-50 z-40 md:hidden"
                    onClick={() => setIsSidebarOpen(false)}
                    aria-hidden="true"
                ></div>
            )}

            <aside className={`fixed inset-y-0 left-0 z-50 w-64 bg-white shadow-lg p-4 transform transition-transform duration-300 ease-in-out md:relative md:translate-x-0 md:flex md:flex-col md:h-full ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
                <div className="flex items-center space-x-3 p-2 mb-6">
                     <div className="flex-shrink-0 bg-purple-600 p-3 rounded-md shadow-md">
                        <i className="fas fa-tools text-white text-xl fa-fw"></i>
                    </div>
                    <div>
                        <h1 className="text-xl font-extrabold text-gray-800">Service Hub</h1>
                        <p className="text-xs text-gray-500">Roshan Bags</p>
                    </div>
                </div>
                <nav className="flex-1 space-y-2 overflow-y-auto">
                    <SidebarLink view="dashboard" icon="fas fa-chart-pie" label="Dashboard" />
                    <SidebarLink view="entry" icon="fas fa-plus-circle" label="New Service Entry" />
                    <SidebarLink view="data" icon="fas fa-database" label="Service Data" />
                    <SidebarLink view="payouts" icon="fas fa-hand-holding-usd" label="Serviceman Payouts" />
                    <SidebarLink view="settings" icon="fas fa-cog" label="Settings" />
                </nav>
            </aside>

            <main className="flex-1 flex flex-col h-full min-w-0 overflow-hidden">
                 {/* Mobile Header */}
                <header className="md:hidden flex items-center justify-between p-4 bg-white shadow-sm z-30">
                    <div className="flex items-center space-x-3">
                        <div className="flex-shrink-0 bg-purple-600 p-2 rounded-md shadow-sm">
                            <i className="fas fa-tools text-white text-lg fa-fw"></i>
                        </div>
                        <div>
                            <h1 className="text-lg font-extrabold text-gray-800">Service Hub</h1>
                            <p className="text-xs text-gray-500">Roshan Bags</p>
                        </div>
                    </div>
                    <button 
                        onClick={() => setIsSidebarOpen(true)} 
                        className="text-gray-600 p-2 rounded-md hover:bg-gray-200 focus:outline-none focus:ring-2 focus:ring-inset focus:ring-purple-500"
                        aria-label="Open sidebar"
                    >
                        <i className="fas fa-bars fa-lg"></i>
                    </button>
                </header>

                <div className="flex-1 p-6 lg:p-10 overflow-y-auto">
                    {loading ? (
                        <div className="flex flex-col justify-center items-center h-full min-h-[400px]">
                            <Spinner size="lg" />
                            <p className="mt-4 text-gray-600 font-medium animate-pulse">Loading Service Hub Data...</p>
                        </div>
                    ) : error ? (
                        <div className="bg-red-50 border-l-4 border-red-500 p-6 rounded-r-xl shadow-sm">
                            <div className="flex items-center">
                                <i className="fas fa-exclamation-circle text-red-500 text-2xl mr-4"></i>
                                <h3 className="text-lg font-bold text-red-800">Connection Error</h3>
                            </div>
                            <p className="mt-2 text-red-700">{error}</p>
                            <button 
                                onClick={() => fetchAllData()} 
                                className="mt-4 inline-flex items-center px-4 py-2 bg-red-600 text-white rounded-md hover:bg-red-700 transition-colors"
                            >
                                <i className="fas fa-sync-alt mr-2"></i> Retry Connection
                            </button>
                        </div>
                    ) : (
                        renderView()
                    )}
                </div>
            </main>

            {isSlipModalOpen && selectedServiceForModal && (
                <ServiceSlipModal service={selectedServiceForModal} onClose={() => setIsSlipModalOpen(false)} />
            )}
             {isUpdateModalOpen && selectedServiceForModal && (
                <UpdateServiceModal 
                    key={`${selectedServiceForModal.serviceId || selectedServiceForModal.rowIndex}`}
                    service={selectedServiceForModal} 
                    servicemenNames={servicemenNames}
                    serviceOptions={serviceOptions}
                    isOpen={isUpdateModalOpen}
                    onClose={() => setIsUpdateModalOpen(false)} 
                    onSuccess={handleUpdateSuccess}
                />
            )}
            {isDownloadModalOpen && selectedServiceForModal && (
                <DownloadSlipModal service={selectedServiceForModal} onClose={() => setIsDownloadModalOpen(false)} />
            )}
        </div>
    );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<React.StrictMode><App /></React.StrictMode>);

// --- End of consolidated application code ---
    </script>
</body>
</html>
